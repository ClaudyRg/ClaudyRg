<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100" width="100%" height="100">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@900&amp;display=swap');
      .cyber-text-shadow {
        font-family: 'Oxanium', sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 64px;
        fill: #1a103c;
        stroke: #1a103c;
        stroke-width: 6px;
        stroke-linejoin: round;
      }
      .cyber-text {
        font-family: 'Oxanium', sans-serif;
        font-weight: 900;
        font-style: italic;
        font-size: 64px;
        fill: url(#cyber-grad);
        stroke: #000000;
        stroke-width: 2px;
        stroke-linejoin: round;
      }
    </style>
    <!-- Cyberpunk purple/pink gradient -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" /> <!-- Bright Pink -->
      <stop offset="60%" style="stop-color:#d946ef;stop-opacity:1" /> <!-- Magenta -->
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" /> <!-- Purple -->
    </linearGradient>
  </defs>
  <!-- Shadow Layer (slanted outline shadow) -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" class="cyber-text-shadow" transform="translate(4, 4)">ClaudyyyRg</text>
  <!-- Main Layer (gradient + dark stroke) -->
  <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle" class="cyber-text">ClaudyyyRg</text>
</svg>
